<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>whiteSNS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white text-gray-900 pb-20">

    <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b z-20 p-4">
        <h1 class="font-bold text-xl">ホーム</h1>
    </header>

    <section class="p-4 border-b">
        <div class="flex gap-3">
            <div class="w-12 h-12 bg-gray-200 rounded-full flex-shrink-0"></div>
            <div class="flex-1">
                <textarea id="post-input" maxlength="500" placeholder="いまどうしてる？" 
                    class="w-full h-24 resize-none outline-none text-lg placeholder:text-gray-500"></textarea>
                <div class="flex justify-between items-center mt-2">
                    <div class="flex gap-4 text-blue-500 text-xl">
                        <button type="button">🖼️</button>
                    </div>
                    <div class="flex items-center gap-3">
                        <span id="char-count" class="text-sm text-gray-500">0 / 500</span>
                        <button class="bg-blue-500 text-white px-5 py-2 rounded-full font-bold disabled:opacity-50" id="post-btn" disabled>
                            投稿
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <nav class="flex border-b overflow-x-auto scrollbar-hide sticky top-[61px] bg-white z-10">
        <button class="tab-item active" data-tab="posts">投稿</button>
        <button class="tab-item" data-tab="replies">返信</button>
        <button class="tab-item" data-tab="media">メディア</button>
        <button class="tab-item" data-tab="likes">いいね</button>
        <button class="tab-item" data-tab="bookmarks">ブックマーク</button>
    </nav>

    <main id="feed" class="divide-y divide-gray-100">
        <div class="p-10 text-center text-gray-400">タイムライン読み込み中...</div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 text-2xl z-20">
        <button>🏠</button>
        <button>🔍</button>
        <button>🔔</button>
        <button>👤</button>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
