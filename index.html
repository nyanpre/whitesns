<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen pb-20">

    <header class="sticky top-0 bg-white/80 backdrop-blur-md border-b p-4 z-10">
        <div class="flex items-center gap-2 bg-gray-100 rounded-full px-4 py-2">
            <span class="text-gray-400">🔍</span>
            <input type="text" placeholder="検索（キーワード、#ハッシュタグ）" class="bg-transparent outline-none w-full text-sm">
        </div>
    </header>

    <section class="p-4 border-b">
        <textarea maxlength="500" placeholder="いまどうしてる？" class="w-full resize-none outline-none text-lg h-24"></textarea>
        <div class="flex justify-between items-center mt-2">
            <button class="text-blue-500 text-xl">🖼️</button>
            <button class="bg-blue-500 text-white px-4 py-1.5 rounded-full font-bold text-sm">投稿する</button>
        </div>
    </section>

    <main>
        <article class="p-4 border-b hover:bg-gray-50 flex gap-3">
            <div class="w-12 h-12 bg-blue-200 rounded-full flex-shrink-0"></div>
            <div class="flex-1">
                <div class="flex items-center gap-1">
                    <span class="font-bold">ユーザー名</span>
                    <span class="text-gray-500 text-sm">@handle · 1分</span>
                </div>
                <p class="mt-1 text-[15px] leading-relaxed">
                    SNSのモックアップ作成中！500文字制限とハッシュタグ機能、スマホでの使いやすさを重視しています。 #開発 #SNS制作
                </p>
                <div class="mt-3 rounded-2xl border aspect-video bg-gray-100 flex items-center justify-center text-gray-400">
                    （画像投稿エリア）
                </div>
                <div class="flex justify-between mt-3 text-gray-500 max-w-xs">
                    <button class="hover:text-blue-500">💬 3</button>
                    <button class="hover:text-green-500">🔁 12</button>
                    <button class="hover:text-pink-500">❤️ 45</button>
                    <button class="hover:text-blue-500">🔖</button>
                </div>
            </div>
        </article>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex justify-around p-3 text-2xl">
        <button class="tab-active">🏠</button>
        <button>🔍</button>
        <button>🔔</button>
        <button>👤</button>
    </nav>

</body>
</html>
